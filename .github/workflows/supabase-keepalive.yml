name: Supabase Keep-Alive

# Ejecutar cada 6 días para mantener Supabase activo
# Supabase free tier pausa proyectos después de 7 días de inactividad
on:
  schedule:
    # Cron: minuto hora día mes día-semana
    # Ejecutar a las 3:00 AM UTC cada 6 días (día 1, 7, 13, 19, 25 de cada mes)
    - cron: '0 3 1,7,13,19,25 * *'
  
  # Permitir ejecución manual desde GitHub UI
  workflow_dispatch:

jobs:
  ping-database:
    runs-on: ubuntu-latest
    
    steps:
      - name: Ping Supabase Database
        run: |
          echo "Pinging Supabase database to keep it active..."
          
          RESPONSE=$(curl -s -w "\n%{http_code}" "${{ secrets.VERCEL_DEPLOYMENT_URL }}/api/cron/keep-alive")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          
          echo "HTTP Status: $HTTP_CODE"
          echo "Response Body: $BODY"
          
          if [ "$HTTP_CODE" -eq 200 ]; then
            echo "✅ Database ping successful!"
          else
            echo "❌ Database ping failed with status $HTTP_CODE"
            exit 1
          fi

      - name: Report Status
        if: always()
        run: |
          if [ $? -eq 0 ]; then
            echo "✅ Keep-alive job completed successfully"
          else
            echo "⚠️ Keep-alive job failed - check logs above"
          fi
